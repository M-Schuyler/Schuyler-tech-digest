name: Daily Tech News Digest

on:
  schedule:
    # 08:00 Asia/Shanghai = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-digest:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4o-mini
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MAX_ARTICLES_PER_SOURCE: "10"
      REQUEST_TIMEOUT: "20"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: services/tech-news-digest
        run: pip install -r requirements.txt

      - name: Run daily digest
        working-directory: services/tech-news-digest
        run: python main.py

      - name: Upload daily report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tech-news-report-${{ github.run_id }}
          path: services/tech-news-digest/reports/*.md
          if-no-files-found: ignore
